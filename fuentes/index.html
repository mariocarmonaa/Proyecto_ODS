<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Proyecto ODS 15 - DAW</title>
    <link rel="stylesheet" type="text/css" href="js/css/estilo.css">
</head>

<body>

    <!-- MENÚ PRINCIPAL (VISTA 0) -->
    <div class="Vista activa">
        <h1>MENÚ ODS 15</h1>
        <button id="botonRegistro">Registrar Usuario</button>
        <button id="botonListado">Ver Listado</button>
        <button id="botonJuego">Jugar</button>
        <button id="botonEstadisticas">Ver Estadísticas</button>
    </div>

    <!-- FORMULARIO DE ALTA (VISTA 1) -->
    <div class="Vista">
        <h2>ALTA DE USUARIO</h2>
        <div>
            <label>Nombre:</label>
            <input id="nombre" type="text" />
        </div>
        <div>
            <label>Fecha de Nacimiento:</label>
            <input id="fecha" type="date" />
        </div>
        <div>
            <label>Género:</label>
            <select id="tipo">
                <option>Masculino</option>
                <option>Femenino</option>
                <option>Prefiero no decirlo</option>
            </select>
        </div>
        <div>
            <p>Animales favoritos en extinción:</p>
            <input type="checkbox" name="animalesExtincion" value="Oso Panda" /> Oso Panda<br>
            <input type="checkbox" name="animalesExtincion" value="Tigre de Bengala" /> Tigre de Bengala<br>
            <input type="checkbox" name="animalesExtincion" value="Ajolote" /> Ajolote<br>
        </div>
        <div>
            <label>¿Por qué los has elegido?:</label>
            <textarea id="descripcion" rows="3"></textarea>
        </div>

        <!-- Input oculto para saber si editamos o guardamos uno nuevo -->
        <input type="hidden" id="idOculto" value="" />

        <div>
            <button id="botonInsertar">Guardar</button>
            <button id="botonLimpiar">Limpiar</button>
            <button class="botonMenu">Volver al Menú</button>
        </div>
    </div>

    <!-- LISTADO DE USUARIOS (VISTA 2) -->
    <div class="Vista">
        <h2>LISTADO DE USUARIOS</h2>
        <table border="1" style="width:100%; text-align:left;">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Fecha Nacimiento</th>
                    <th>Género</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaCuerpo"></tbody>
        </table>
        <br>
        <button class="botonMenu">Volver al Menú</button>
    </div>

    <!-- ESTADÍSTICAS (VISTA 3) -->
    <div class="Vista">
        <h2>ESTADÍSTICAS</h2>
        <div id="estadisticasContenido"></div>
        <button class="botonMenu">Volver al Menú</button>
    </div>

    <!-- PANTALLA DE JUEGO (VISTA 4) -->
    <div class="Vista" id="vistaJuego">
        <div id="hudJuego">
            <div id="contador">Tiempo: 0s</div>
            <div id="puntos">Bananas: 0</div>
            <button class="botonMenu" id="botonSalirJuego">Salir al Menú</button>
        </div>
        <img id="monoAviador" src="img/monoAventurero.png" alt="Mono" />
        <img id="imagenJungla" src="img/imagenJungla.png" alt="Jungla" />
    </div>

    <!-- CARGA DE SCRIPTS EN ORDEN -->
    <script src="js/modelos/jugador.js"></script>
    <script src="js/modelos/modelojugador.js"></script>

    <script src="js/vistas/vistajuego.js"></script>
    <script src="js/vistas/vistaregistro.js"></script>
    <script src="js/vistas/vistaestadisticas.js"></script>

    <script src="js/controladores/controladorjuego.js"></script>
    <script src="js/controladores/controladorregistro.js"></script>
    <script src="js/controladores/controladorestadisticas.js"></script>

    <script src="js/navegacion.js"></script>
</body>

</html>
