<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CRUD ODS</title>

    <link rel="stylesheet" href="css/estilos.cs">
</head>

<body>

    <div class="vistaActiva"> FORMULARIO DE ALTA DE USUARIOS
        <div>
            <label for="nombre">Introduce el nombre de usuario: </label>
            <input id="nombre" type="text" />
        </div>

        <div>
            <label for="fecha">Introduce tu fecha de nacimiento: </label>
            <input id="fecha" type="date" />
        </div>

        <div>
            <label for="tipo">Introduce tu género: </label>
            <select id="tipo">
                <option>Masculino</option>
                <option>Femenino</option>
                <option>Prefiero no decirlo</option>
            </select>
        </div>

        <p>Selecciona tus animales en peligro de extinción favoritos: </p>
        <div>
            <input type="checkbox" id="panda" name="animalesExtincion" value="panda" />
            <label for="panda">Oso Panda</label><br>
        </div>
        <div>
            <input type="checkbox" id="tigre" name="animalesExtincion" value="tigre" />
            <label for="tigre">Tigre de Bengala</label><br>
        </div>
        <div>
            <input type="checkbox" id="ajolote" name="animalesExtincion" value="ajolote" />
            <label for="ajolote">Ajolote</label><br>
        </div>

        <div>
            <label for="descripcion">Introduce una breve explicación de porque has elegido estos animales: </label><br>
            <textarea id="descripcion" rows="4" cols="50" placeholder="Deja aquí tu descripcion:..."></textarea>
        </div>

        <input type="hidden" id="idOculto" value="" />

        <div>
            <button id="botonInsertar">Registrar</button>
        </div>
    </div>



    <div id="mensajeEstado" class="mensaje"></div>


    <div class="filtros">
        <h3>Buscar / Filtrar</h3>
        <input type="text" id="campoBusqueda" placeholder="Buscar por nombre..." />
        <button id="botonBuscar">Buscar</button>
        <button id="botonResetBusqueda"> Limpiar</button>
        <br><br>
        <label for="filtroAnimal">Filtrar por animal favorito:</label>
        <select id="filtroAnimal">
            <option value="">-- Todos --</option>
            <option value="panda">Oso Panda</option>
            <option value="tigre">Tigre de Bengala</option>
            <option value="ajolote">Ajolote</option>
        </select>
        <button id="botonFiltrar">Filtrar</button>
    </div>


    <div class="listado">
        <h3>Lista de jugadores</h3>
        <div id="listaJugadores"></div>
    </div>


    <div class="estadisticas">
        <h3>Estadísticas</h3>
        <div id="estadisticas"></div>
        <button id="botonEstadisticas">Actualizar estadísticas</button>
    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
