<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <title>CRUD ODS</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

    <section id="vista-login" class="vista">
        <h1>ACCESO AL SISTEMA</h1>
        <div>
            <label>Usuario</label>
            <input type="text" id="user">
        </div>
        <div>
            <label>Contraseña</label>
            <input type="password" id="pass">
        </div>
        <button id="btnEntrar">Enviar para avanzar</button>
    </section>

    <nav id="menu-navegacion" style="display:none">
        <button id="btnNavForm">Ir al Formulario</button>
        <button id="btnNavLista">Ver Listado</button>
        <button id="btnNavSalir">Salir</button>
    </nav>

    <section id="vista-formulario" class="vista" style="display:none">
        <h2>FORMULARIO DE ALTA DE USUARIOS</h2>
        <input type="hidden" id="idOculto">

        <label>Introduce el nombre de usuario:</label>
        <input id="nombre" type="text" /><br>

        <label>Introduce tu fecha de nacimiento:</label>
        <input id="fecha" type="date" /><br>

        <label>Introduce tu género:</label>
        <select id="tipo">
            <option>Masculino</option>
            <option>Femenino</option>
            <option>Prefiero no decirlo</option>
        </select>

        <p>Selecciona tus animales favoritos:</p>
        <input type="checkbox" id="panda" value="panda"> Oso Panda<br>
        <input type="checkbox" id="tigre" value="tigre"> Tigre de Bengala<br>
        <input type="checkbox" id="ajolote" value="ajolote"> Ajolote<br>

        <label>Explicación de tu elección:</label><br>
        <textarea id="descripcion"></textarea><br>

        <button id="botonInsertar">Registrar</button>
    </section>

    <section id="vista-listado" class="vista" style="display:none">
        <h3>Buscar / Filtrar</h3>
        <input type="text" id="campoBusqueda">
        <button id="botonBuscar">Buscar</button>
        <button id="botonResetBusqueda">Limpiar</button>

        <p>Filtrar por animal:
            <select id="filtroAnimal">
                <option value="">-- Todos --</option>
                <option value="panda">Oso Panda</option>
                <option value="tigre">Tigre de Bengala</option>
                <option value="ajolote">Ajolote</option>
            </select>
            <button id="botonFiltrar">Filtrar</button>
        </p>

        <hr>
        <h3>Lista de jugadores</h3>
        <div id="listaJugadores"></div>

        <hr>
        <h3>Estadísticas</h3>
        <div id="estadisticas"></div>
        <button id="botonEstadisticas">Actualizar estadísticas</button>
    </section>

    <script type="module" src="js/app.js"></script>
</body>

</html>
