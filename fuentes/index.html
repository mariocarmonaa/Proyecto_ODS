<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CRUD ODS</title>
    <link rel="stylesheet" type="text/css" href="js/css/estilo.css">
</head>

<body>
    <div class="Vista activa">MENU DEL JUEGO
        <button id="botonRegistro">Ir al registro de usuarios</button>
        <button id="botonListado">Ir al listado de usuarios</button>
        <button id="botonJuego">Ir al juego</button>
    </div>
    <div class="Vista"> FORMULARIO DE ALTA DE USUARIOS
        <div>
            <label for="nombre">Introduce el nombre de usuario: </label>
            <input id="nombre" type="text" />
        </div>

        <div>
            <label for="fecha">Introduce tu fecha de nacimiento: </label>
            <input id="fecha" type="date" />
        </div>

        <div>
            <label for="tipo">Introduce tu género: </label>
            <select id="tipo">
                <option>Masculino</option>
                <option>Femenino</option>
                <option>Prefiero no decirlo</option>
            </select>
        </div>

        <p>Selecciona tus animales en peligro de extinción favoritos: </p>
        <div>
            <input type="checkbox" id="panda" name="animalesExtincion" value="panda" />
            <label for="panda">Oso Panda</label><br>
        </div>
        <div>
            <input type="checkbox" id="tigre" name="animalesExtincion" value="tigre" />
            <label for="tigre">Tigre de Bengala</label><br>
        </div>
        <div>
            <input type="checkbox" id="ajolote" name="animalesExtincion" value="ajolote" />
            <label for="ajolote">Ajolote</label><br>
        </div>

        <div>
            <label for="descripcion">Introduce una breve explicación de porque has elegido estos animales: </label><br>
            <textarea id="descripcion" rows="4" cols="50" placeholder="Deja aquí tu descripcion:..."></textarea>
        </div>

        <input type="hidden" id="idOculto" value="" />

        <div>
            <button id="botonInsertar">Registrar</button>
            <button id="botonLimpiar">Limpiar formulario</button>
            <button class="botonMenu">Volver al menú</button>
        </div>
		<script type="module" defer src="js/controladores/ControladorRegistro.js"></script>
        <script type="module" defer src="js/navegacion.js"></script>
        <script type="module" defer src="js/controladores/controladorjuego.js"></script>
    </div>
    <div class="Vista">LISTADO DE USUARIOS
        <hr />
        <table>
            <thead>
                <th>Nombre</th>
                <th>Fecha de Nacimiento</th>
                <th>Genero</th>
            </thead>
            <tbody>
            </tbody>
        </table>
        <button class="botonMenu">Volver al menú</button>
    </div>
    <div class="Vista">
        <img id="monoAviador" src="img/monoAventurero.png" />
    </div>
</body>

</html>
